# Development overrides — hot reload and exposed ports
services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      ENVIRONMENT: development
      AIR_WD: /app
    command: air -c .air.toml

  frontend:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev

volumes:
  go_mod_cache:
  go_build_cache:
